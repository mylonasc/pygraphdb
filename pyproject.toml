[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pygraphdb"
version = "0.1.0"
description = "A pure Python GraphDB for attributed graphs."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "msgpack>=1.0.0",
]

[project.optional-dependencies]
lmdb = ["lmdb"]
leveldb = ["plyvel"]
bloom = ["pybloom-live"]
all = ["lmdb", "plyvel", "pybloom-live"]

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["graphdb", "kvstores", "serializers"]
