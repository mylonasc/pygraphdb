[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "pygraphdb"
version = "0.1.0"
description = "A pure Python GraphDB for attributed graphs."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "lmdb",
    "plyvel",
    "pybloom-live",
]

[tool.setuptools.packages.find]
where = ["src"]
